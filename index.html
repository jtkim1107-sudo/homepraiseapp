<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>우리집 칭찬가게</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stage">
    <div class="phone" id="phone">
      <header class="app-header" id="app-header"></header>
      <main class="app-main" id="app-main"></main>
      <nav class="app-tabs" id="app-tabs"></nav>
      <div class="toast" id="toast" hidden></div>
      <div class="celebration" id="celebration" hidden>
        <div class="confetti-layer" id="confetti"></div>
        <div class="celebration-inner">
          <div class="celebration-emoji" id="celebration-emoji"></div>
          <div class="celebration-text" id="celebration-text"></div>
          <div class="celebration-sub" id="celebration-sub"></div>
          <div class="celebration-hint">화면을 톡 누르면 닫혀요</div>
        </div>
      </div>
      <div class="modal" id="pin-modal" hidden>
        <div class="modal-scrim" data-action="close-pin"></div>
        <div class="modal-panel -pin">
          <div class="modal-head">
            <div class="modal-title">부모님 비밀번호 🔒</div>
            <button class="modal-close" data-action="close-pin" aria-label="닫기">✕</button>
          </div>
          <div class="pin-dots" id="pin-dots"></div>
          <div class="pin-pad">
            <button class="pin-key" data-action="pin-digit" data-digit="1">1</button>
            <button class="pin-key" data-action="pin-digit" data-digit="2">2</button>
            <button class="pin-key" data-action="pin-digit" data-digit="3">3</button>
            <button class="pin-key" data-action="pin-digit" data-digit="4">4</button>
            <button class="pin-key" data-action="pin-digit" data-digit="5">5</button>
            <button class="pin-key" data-action="pin-digit" data-digit="6">6</button>
            <button class="pin-key" data-action="pin-digit" data-digit="7">7</button>
            <button class="pin-key" data-action="pin-digit" data-digit="8">8</button>
            <button class="pin-key" data-action="pin-digit" data-digit="9">9</button>
            <button class="pin-key -ghost" disabled></button>
            <button class="pin-key" data-action="pin-digit" data-digit="0">0</button>
            <button class="pin-key -back" data-action="pin-back" aria-label="지우기">⌫</button>
          </div>
        </div>
      </div>
      <div class="modal" id="settings-modal" hidden>
        <div class="modal-scrim" data-action="close-settings"></div>
        <div class="modal-panel">
          <div class="modal-head">
            <div class="modal-title">가족 이름 설정</div>
            <button class="modal-close" data-action="close-settings" aria-label="닫기">✕</button>
          </div>
          <div class="modal-body" id="settings-body"></div>
          <div class="modal-actions">
            <button class="btn-secondary" data-action="reset-names">기본값으로</button>
            <button class="btn-primary" data-action="save-names">저장</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js" defer></script>
</body>
</html>
